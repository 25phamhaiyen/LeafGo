server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;
    server_tokens off;

    resolver 127.0.0.11 valid=30s ipv6=off;

    set $api_upstream api:8080;
    set $flutter_upstream flutter:80;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # API routes
    location /api/ {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Swagger (RoutePrefix = "" nen nam o root cua API)
    location /swagger {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SignalR
    location /hubs/ {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Health check API
    location /health {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Flutter Web (tat ca route con lai)
    location / {
        proxy_pass http://$flutter_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_intercept_errors on;
        error_page 404 = @flutter_fallback;
    }

    location @flutter_fallback {
        proxy_pass http://$flutter_upstream/index.html;
    }
}