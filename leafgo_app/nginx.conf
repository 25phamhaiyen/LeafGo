server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Quan trọng: Flutter Web là SPA
    # Mọi route /home, /login, /profile... đều trả về index.html
    # Flutter tự xử lý routing phía client
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets tĩnh 1 năm (js, css, images, fonts)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}